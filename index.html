<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You Bhunti</title>
  <link rel="stylesheet" href="./style/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    margin: 0;
    padding: 0;
  }

  canvas {
    width: 100vw !important;
    height: 100vh !important;
    display: block;
  }

  img {
    max-width: 100%;
    height: auto;
  }

  @media (max-width: 768px) {
    #bear {
      width: 75px !important;
      left: 8px !important;
      bottom: 20px !important;
    }

    #photoWrap {
      left: 50% !important;
      top: 60% !important;
      transform: translate(-50%, 20px) scale(0.85) !important;
    }

    #photoWrap.show {
      transform: translate(-50%, 0) scale(0.9) !important;
    }

    #heartFrame {
      width: 170px !important;
      height: 170px !important;
    }

    #heartFrame::before,
    #heartFrame::after {
      width: 170px !important;
      height: 170px !important;
    }

    #heartFrame::before {
      top: -85px !important;
    }

    #heartFrame::after {
      left: 85px !important;
    }

    #girlPhoto {
      width: 120% !important;
      height: 120% !important;
      top: -28px !important;
      left: -8px !important;
    }
  }

  @media (max-width: 480px) {
    #photoWrap {
      top: 62% !important;
      transform: translate(-50%, 15px) scale(0.78) !important;
    }

    #photoWrap.show {
      transform: translate(-50%, 0) scale(0.82) !important;
    }

    #heartFrame {
      width: 145px !important;
      height: 145px !important;
    }

    #heartFrame::before,
    #heartFrame::after {
      width: 145px !important;
      height: 145px !important;
    }

    #heartFrame::before {
      top: -72.5px !important;
    }

    #heartFrame::after {
      left: 72.5px !important;
    }

    #girlPhoto {
      width: 118% !important;
      height: 118% !important;
      top: -20px !important;
      left: -6px !important;
    }
  }
</style>
</head>
<body>
  <div id="startScreen">
  <div class="startBox">
    <h1>For You 💗</h1>
    <p>Tap the button to see something special</p>
    <button id="startBtn">Open this, Bhunti 💖</button>
  </div>
</div>
  <canvas id="canvas"></canvas>

  <div id="rotateNotice" style="display:none;">
    <div class="overlay">
      <p>Please rotate your screen horizontally for the best viewing experience. 🌟</p>
    </div>
  </div>

  <img
    id="bear"
    src="https://i.pinimg.com/originals/e5/c5/4c/e5c54cd43fd75a7ec5b7cf0f65838ec3.gif"
    alt="Bear"
  />

  <div id="photoWrap" aria-hidden="true">
    <div class="smoke smoke1"></div>
    <div class="smoke smoke2"></div>
    <div class="smoke smoke3"></div>

    <div id="heartFrame">
      <img id="girlPhoto" src="girl.jpeg" alt="Bhunti" />
    </div>
  </div>

  <script src="./style/script.js"></script>
</body>
</html>
